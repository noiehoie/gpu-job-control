name: Publish RunPod worker image

on:
  push:
    branches: [main]
    paths:
      - "docker/runpod-llm-worker.Dockerfile"
      - "src/gpu_job/workers/runpod_llm.py"
      - ".github/workflows/publish-runpod-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-runpod-llm
  DOCKERFILE: docker/runpod-llm-worker.Dockerfile

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build local canary image
        run: |
          docker build \
            --file "$DOCKERFILE" \
            --tag gpu-job-runpod-llm:ci \
            .

      - name: Run local canary container
        run: |
          docker run --rm \
            --env GPU_JOB_RUNPOD_LOCAL_TEST=1 \
            gpu-job-runpod-llm:ci

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Deterministic RunPod canary worker for gpu-job-control

      - name: Print image digest
        run: |
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
