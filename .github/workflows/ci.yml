name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Compile
        run: uv run python -m compileall src tests

      - name: Unit tests
        run: uv run python -m unittest discover -s tests

      - name: Static safety lint
        run: uv run --with ruff ruff check src tests

      - name: Format check
        run: uv run --with ruff ruff format --check src tests

      - name: Council audit gate
        run: uv run python scripts/validate_council_audit.py

      - name: Selftest
        run: uv run gpu-job selftest

      - name: Validate example job
        run: uv run gpu-job validate examples/jobs/asr.example.json
